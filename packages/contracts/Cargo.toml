[package]
name = "omnicurve-contracts"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["export-abi"]
export-abi = ["stylus-sdk/export-abi"]

[dependencies]
stylus-sdk = { version = "0.10.7", default-features = false }
alloy-primitives = { version = "1.6.0", default-features = false }
