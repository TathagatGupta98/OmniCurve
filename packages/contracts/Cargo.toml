

[package]
name = "omnicurve-contracts"
version = "0.0.0"
edition = "2021"
publish = false

[profile.release]
codegen-units = 1
strip = true
lto = true
opt-level = "s"
panic = "abort"

[profile.dev]
# panic = "immediate-abort"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["mini-alloc"]
export-abi = ["stylus-sdk/export-abi"]
mini-alloc = ["stylus-sdk/mini-alloc"]
amm = []
router = []
factory = []
lp-token = []

[dependencies]
stylus-sdk = { version = "0.10.7", default-features = false }
alloy-primitives = { version = "1.6.0" }
alloy-sol-types = { version = "1.6.0" }

[dev-dependencies]
# Stylus unit-test harness (TestVM). Host-only; never compiled for wasm32.
stylus-sdk = { version = "0.10.7", features = ["stylus-test"] }
